[sofware_path]
#TSHARK位置
tshark_path=E:/software/Wireshark/tshark.exe
#tshark捕包的网络接口名字
tshark_interface_number=Ethernet
#谷歌浏览器用户浏览信息的存放位置
chrome_user_data_path=C:/Users/Administrator/AppData/Local/Google/Chrome/User Data
#mitmdump 可执行文件位置
mitmproxy_path=E:/software/Python/Scripts/mitmdump.exe
#mitmproxy_video_label.py文件存放位置
mitm_py=E:/project/Shrink/src/video_finger_clawer/mitmproxy_video_label.py
#chromdriver位置
chrome_driver_path=E:/project/Shrink/src/chromedriver.exe

[record_path]
#结果记录位置
root_path=E:/project/Shrink/data/record/
#mitm记录的文件临时存放位置
mitm_record_path=E:/project/Shrink/data/temp/mitm/
#ping记录的文件临时存放位置
ping_record_path=E:/project/Shrink/data/temp/ping/

[clawer]
#视频服务商解析配置文件地址
video_parse_conf_file_path=E:/project/Shrink/bin/youtube_parse.conf
#采集模式，1为构建标注视频流（批量播放），0为构建视频指纹库（逐一播放）
clawer_type=0
#每一个视频的播放时长，单位秒
time_duration=600
#每一个pcap文件中播放多少视频,此处应取1
batch_size=1
#总共播放多少批视频,当batch_size=1时表示总共播放多少个视频
batch_count=100
#是否需要自动点击播放按键，1为是，0为否
player_click=0
#是否采用mitm进行解密并记录明文信息，1为是，0为否
mitm_flag=0
#是否采用tshark记录流量，1为是，0为否
tshark_flag=1
#是否记录截图，1为是，0为否
screenshot_flag=1
#存放待爬取URL的CSV文件路径
url_csv_path=E:/project/Shrink/data/temp/url_list.csv
#视频分辨率选择:0为所有分辨率，1为360p，2为480p，3为720p，4为1080p。可选多个(用,号隔开)，例如clawer_video_resolution=1,2,3
clawer_video_resolution=3

[ping]
#是否记录视频流的链路时延信息 0为不记录，1为记录
ping_record_flag=0
#icmp 包丢包时长，单位秒
ping_timeout=0.1
#icmp发包时间间隔，单位秒
ping_interval=0.001
#icmp发包数量
ping_count=1000
#icmp包负载大小
ping_size=1